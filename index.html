<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Overdrive: Energy Mesh</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    video { display: none; }
    canvas { width: 100%; max-width: 1000px; border-radius: 10px; border: 2px solid #222; transform: scaleX(-1); } 
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script>
    const videoElement = document.getElementById('video');
    const canvasElement = document.getElementById('canvas');
    const canvasCtx = canvasElement.getContext('2d');

    const hands = new Hands({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});
    
    // Kept confidence slightly lower for faster tracking on all these lines
    hands.setOptions({
      maxNumHands: 2, 
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await hands.send({image: videoElement}); },
      width: 1280,
      height: 720
    });
    camera.start();

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      const w = canvasElement.width;
      const h = canvasElement.height;

      // Dark cinematic overlay
      canvasCtx.drawImage(results.image, 0, 0, w, h);
      canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      canvasCtx.fillRect(0, 0, w, h);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length === 2) {
        const hand1 = results.multiHandLandmarks[0];
        const hand2 = results.multiHandLandmarks[1];

        // 1. THE 21-POINT HOLOGRAPHIC CYLINDER
        // Connects every single joint on Hand 1 to the same joint on Hand 2
        for (let i = 0; i < 21; i++) {
          const point1 = hand1[i];
          const point2 = hand2[i];

          // Create a dynamic rainbow spectrum based on the joint number
          const hue = (i / 21) * 360;
          const color = `hsla(${hue}, 100%, 60%, 0.9)`;

          canvasCtx.beginPath();
          canvasCtx.moveTo(point1.x * w, point1.y * h);
          canvasCtx.lineTo(point2.x * w, point2.y * h);
          
          canvasCtx.shadowBlur = 10;
          canvasCtx.shadowColor = color;
          canvasCtx.strokeStyle = color;
          canvasCtx.lineWidth = 3;
          canvasCtx.stroke();
        }

        // 2. THE SCI-FI SPIDERWEB (Cross-connections)
        // Connects EVERY fingertip on Hand 1 to EVERY fingertip on Hand 2
        const tips = [4, 8, 12, 16, 20]; // Thumb, Index, Middle, Ring, Pinky
        
        canvasCtx.shadowBlur = 0; // Turn off glow for the web to save FPS
        
        for (let i = 0; i < tips.length; i++) {
          for (let j = 0; j < tips.length; j++) {
            const tip1 = hand1[tips[i]];
            const tip2 = hand2[tips[j]];

            canvasCtx.beginPath();
            canvasCtx.moveTo(tip1.x * w, tip1.y * h);
            canvasCtx.lineTo(tip2.x * w, tip2.y * h);
            
            // Faint cyan colored web
            canvasCtx.strokeStyle = 'rgba(0, 255, 255, 0.2)'; 
            canvasCtx.lineWidth = 1;
            canvasCtx.stroke();
          }
        }

        // 3. DRAW GLOWING JOINTS
        // Draw white dots on all 42 joints to anchor the lines
        for (const landmarks of results.multiHandLandmarks) {
          for (let i = 0; i < 21; i++) {
            canvasCtx.beginPath();
            canvasCtx.arc(landmarks[i].x * w, landmarks[i].y * h, 4, 0, 2 * Math.PI);
            canvasCtx.fillStyle = 'white';
            canvasCtx.fill();
          }
        }
      }
    }
  </script>
</body>
</html>
