<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR 3D Circular Helix</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    video { display: none; }
    canvas { width: 100%; max-width: 1000px; border-radius: 10px; border: 2px solid #222; transform: scaleX(-1); } 
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script>
    const videoElement = document.getElementById('video');
    const canvasElement = document.getElementById('canvas');
    const canvasCtx = canvasElement.getContext('2d');

    const hands = new Hands({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});
    
    // Optimized for 1 hand to keep the 3D math running at high FPS
    hands.setOptions({
      maxNumHands: 1, 
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await hands.send({image: videoElement}); },
      width: 1280,
      height: 720
    });
    camera.start();

    // Helper Math Function
    function getDistance(p1, p2) {
      return Math.hypot(p1.x - p2.x, p1.y - p2.y);
    }

    // Animation Variables
    let time = 0;
    let currentRadius = 40; // Base size
    let targetRadius = 40;

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
      const w = canvasElement.width;
      const h = canvasElement.height;

      // Dark cinematic background
      canvasCtx.drawImage(results.image, 0, 0, w, h);
      canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      canvasCtx.fillRect(0, 0, w, h);

      // Increment time for the rotation animation
      time += 0.08; 

      // Smoothly animate the radius growing and shrinking
      currentRadius += (targetRadius - currentRadius) * 0.1;

      if (results.multiHandLandmarks && results.multiHandLandmarks.length === 1) {
        const hand = results.multiHandLandmarks[0];

        // Get the center of the palm (Landmark 9) to anchor the helix
        const centerX = hand[9].x * w;
        const centerY = hand[9].y * h;

        // Check distance between Thumb (4) and Pinky (20)
        const thumb = hand[4];
        const pinky = hand[20];
        const dist = getDistance(thumb, pinky);

        // If thumb and pinky are touching, GROW! Otherwise, shrink back.
        if (dist < 0.07) {
            targetRadius = 250; // Max charged size
        } else {
            targetRadius = 40;  // Resting size
        }

        // --- DRAW THE 3D CIRCULAR HELIX ---
        // We draw two twisting paths to create a 3D DNA-style ring
        const twists = 12; // How many times it wraps around the circle
        const tubeThickness = currentRadius * 0.3; // The 3D thickness of the ring
        
        // Dynamic color that shifts over time and intensity
        const hue = (time * 20 + currentRadius) % 360; 
        
        canvasCtx.shadowBlur = 15;
        canvasCtx.lineWidth = 3 + (currentRadius * 0.02); // Line gets thicker as it grows

        // Draw Strand 1
        canvasCtx.beginPath();
        for (let i = 0; i <= Math.PI * 2.05; i += 0.05) {
            // Complex math mapping a 3D helix onto a 2D canvas
            let x = centerX + (currentRadius + tubeThickness * Math.cos(i * twists + time)) * Math.cos(i);
            let y = centerY + (currentRadius + tubeThickness * Math.cos(i * twists + time)) * Math.sin(i);
            if (i === 0) canvasCtx.moveTo(x, y);
            else canvasCtx.lineTo(x, y);
        }
        canvasCtx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
        canvasCtx.shadowColor = `hsl(${hue}, 100%, 60%)`;
        canvasCtx.stroke();

        // Draw Strand 2 (offset by 180 degrees / Math.PI to complete the 3D illusion)
        canvasCtx.beginPath();
        for (let i = 0; i <= Math.PI * 2.05; i += 0.05) {
            let x = centerX + (currentRadius + tubeThickness * Math.cos(i * twists + time + Math.PI)) * Math.cos(i);
            let y = centerY + (currentRadius + tubeThickness * Math.cos(i * twists + time + Math.PI)) * Math.sin(i);
            if (i === 0) canvasCtx.moveTo(x, y);
            else canvasCtx.lineTo(x, y);
        }
        // Make the second strand a slightly different color for contrast
        canvasCtx.strokeStyle = `hsl(${(hue + 40) % 360}, 100%, 60%)`;
        canvasCtx.shadowColor = `hsl(${(hue + 40) % 360}, 100%, 60%)`;
        canvasCtx.stroke();

        // Optional: Draw a line between thumb and pinky so you can see the "trigger"
        canvasCtx.beginPath();
        canvasCtx.moveTo(thumb.x * w, thumb.y * h);
        canvasCtx.lineTo(pinky.x * w, pinky.y * h);
        canvasCtx.strokeStyle = dist < 0.07 ? '#00FF00' : '#FF0000'; // Green when triggered, Red when open
        canvasCtx.lineWidth = 2;
        canvasCtx.shadowBlur = 0;
        canvasCtx.stroke();
      }
    }
  </script>
</body>
</html>
